version: 1.0

application:
  random_seed: 8201

profiles:
  causal_entropy:
    type: computer
    name: Causal Entropy
    intelligence:
      type: causal_entropy
      parameters:
        horizon: 5
        temperature: 1.0
        tie_breaker: random

  tactical:
    type: computer
    name: Tactical Baseline
    intelligence:
      type: tactical
      parameters:
        tie_breaker: deterministic

match:
  player_1: causal_entropy
  player_2: tactical

presentation:
  show_replay: false
  replay_boards_per_row: 4
  show_computer_scores: true
