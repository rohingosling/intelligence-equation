version: 1.0

application:
  random_seed: null

profiles:
  human:
    type: human
    name: Rohin

  random:
    type: computer
    name: Random Baseline
    intelligence:
      type: random

  tactical:
    type: computer
    name: Tactical Baseline
    intelligence:
      type: tactical
      parameters:
        tie_breaker: deterministic

  minimax:
    type: computer
    name: Minimax Baseline
    intelligence:
      type: minimax
      parameters:
        tie_breaker: deterministic

  causal_entropy:
    type: computer
    name: Causal Entropy
    intelligence:
      type: causal_entropy
      parameters:
        horizon: 5
        temperature: 1.0
        tie_breaker: random

match:
  player_1: causal_entropy
  player_2: random

presentation:
  show_replay: true
  replay_boards_per_row: 4
  show_computer_scores: true
